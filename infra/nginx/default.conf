# Custom access-log format for /api/v1/notifications.
# Drops $args / $query_string from the log line because the GET endpoint
# carries the subscriber's contact (PII, A1) as a query parameter.
# Mirrors the default "combined" format but logs $uri (path only) instead
# of $request (which would include the full query string).
log_format notifications_no_args
    '$remote_addr - $remote_user [$time_local] '
    '"$request_method $uri $server_protocol" '
    '$status $body_bytes_sent '
    '"$http_referer" "$http_user_agent"';

server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;

    index index.php;

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PII masking in access-log (A1): the contact is carried as a query
    # parameter, so we log with the no-args format above.
    location /api/v1/notifications {
        access_log /var/log/nginx/access.log notifications_no_args;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location /health {
        access_log off;
        return 200 'OK';
    }
}
