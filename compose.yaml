services:
  app:
    build:
      context: ./src
      target: app
    image: notification-service-app
    restart: unless-stopped
    env_file: ./src/.env
    volumes:
      - ./src:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/storage
      - /var/www/html/bootstrap/cache
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - notifications-nw
    healthcheck:
      test: ["CMD", "php-fpm-healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      app:
        condition: service_healthy
    networks:
      - notifications-nw
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-notifications}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - notifications-nw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbit_data:/var/lib/rabbitmq
    networks:
      - notifications-nw
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/var/lib/redis
    networks:
      - notifications-nw
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3

  migrate:
    build:
      context: ./src
      target: app
    restart: "no"
    env_file: ./src/.env
    volumes:
      - ./src:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/storage
      - /var/www/html/bootstrap/cache
    command: php artisan migrate --force
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - notifications-nw

  worker-transactional:
    build:
      context: ./src
      target: app
    restart: unless-stopped
    env_file: ./src/.env
    volumes:
      - ./src:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/storage
      - /var/www/html/bootstrap/cache
    command: php artisan rabbitmq:consume notifications.transactional
    init: true
    deploy:
      replicas: 4
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - notifications-nw
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'rabbitmq:consume notifications.transactional' > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker-marketing:
    build:
      context: ./src
      target: app
    restart: unless-stopped
    env_file: ./src/.env
    volumes:
      - ./src:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/storage
      - /var/www/html/bootstrap/cache
    command: php artisan rabbitmq:consume notifications.marketing
    init: true
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - notifications-nw
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'rabbitmq:consume notifications.marketing' > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker-outbox:
    build:
      context: ./src
      target: app
    restart: unless-stopped
    env_file: ./src/.env
    volumes:
      - ./src:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/storage
      - /var/www/html/bootstrap/cache
    command: php artisan outbox:publish --loop
    init: true
    deploy:
      replicas: 2
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - notifications-nw
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'outbox:publish --loop' > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker-default:
    build:
      context: ./src
      target: app
    restart: unless-stopped
    env_file: ./src/.env
    volumes:
      - ./src:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/storage
      - /var/www/html/bootstrap/cache
    command: php artisan queue:work database --queue=default --tries=3
    init: true
    deploy:
      replicas: 1
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - notifications-nw
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'queue:work database' > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  notifications-nw:
    driver: bridge

volumes:
  pg_data:
  rabbit_data:
  redis_data:
